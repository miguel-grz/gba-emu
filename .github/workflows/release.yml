# Builds the Pocket desktop app on macOS, Windows, and Linux and attaches the
# installers to a GitHub Release. Each OS's installer must be built on that OS,
# so this fans out across three runners. Triggered by pushing a version tag
# (e.g. `git tag v0.1.0 && git push origin v0.1.0`) or manually from the Actions
# tab. The release is created as a draft — review it, then publish.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal .dmg (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04 # .AppImage + .deb
            args: ""
            rust_targets: ""
          - platform: windows-latest # .msi + .exe
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install npm dependencies
        run: npm ci

      # tauri-action runs the config's beforeBuildCommand (npm run wasm && npm run
      # build), bundles the app, and uploads the installers to a draft release.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pocket ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
